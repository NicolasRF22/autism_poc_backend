services:
  - type: web
    name: autism-backend
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: bash scripts/start_render.sh
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DEBUG
        value: "False"
      - key: DATA_BACKEND
        value: postgres
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: AUTH_ADMIN_USERNAME
        value: admin
      - key: AUTH_ADMIN_PASSWORD
        sync: false
      - key: AUTH_JWT_SECRET
        sync: false
      - key: AUTH_TOKEN_EXP_MINUTES
        value: "480"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: OBJECT_STORAGE_BACKEND
        value: supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET_RAG
        value: rag-documents
      - key: SUPABASE_STORAGE_BUCKET_PEI
        value: pei-documents
      - key: CHROMA_API_KEY
        sync: false
      - key: CHROMA_TENANT
        sync: false
      - key: CHROMA_DATABASE
        sync: false
      - key: CHROMA_COLLECTION_NAME
        value: documentos_pei